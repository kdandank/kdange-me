name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt -q

      - name: Run test suite
        run: python3 -m unittest discover -s tests -v
